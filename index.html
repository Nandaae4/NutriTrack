<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriTrack | Health Planner</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>NutriTrack</h1>
        <p>Monitor nutrisi harianmu</p>
      </header>

      <div class="card">
        <div class="form-group">
          <label>Berat (kg)</label>
          <input id="berat" type="number" placeholder="Contoh: 60" />
        </div>
        <div class="form-group">
          <label>Tinggi (cm)</label>
          <input id="tinggi" type="number" placeholder="Contoh: 170" />
        </div>
        <div class="form-group">
          <label>Umur</label>
          <input id="umur" type="number" placeholder="Contoh: 20" />
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label>Gender</label>
            <select id="gender">
              <option value="pria">Pria</option>
              <option value="wanita">Wanita</option>
            </select>
          </div>
          <div class="form-group">
            <label>Aktivitas</label>
            <select id="aktivitas">
              <option value="rendah">Low</option>
              <option value="sedang">Moderate</option>
              <option value="tinggi">High</option>
            </select>
          </div>
        </div>

        <label>Target</label>
        <select id="target">
          <option value="turun">Turun Berat Badan</option>
          <option value="naik">Naik Berat Badan</option>
        </select>

        <button onclick="proses()">Generate Rencana</button>
      </div>

      <div id="loading" class="card hidden">
        <div class="spinner"></div>
        <p>Menghitung nutrisi terbaik untukmu...</p>
      </div>

      <div id="hasil"></div>

      <div class="card chart-container">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
