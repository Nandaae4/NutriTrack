<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>NutriTrack</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">

  <h1>NutriTrack</h1>

  <div class="card">
    <input id="berat" type="number" placeholder="Berat (kg)">
    <input id="tinggi" type="number" placeholder="Tinggi (cm)">
    <input id="umur" type="number" placeholder="Umur">

    <select id="gender">
      <option value="pria">Pria</option>
      <option value="wanita">Wanita</option>
    </select>

    <select id="aktivitas">
      <option value="rendah">Low Activity</option>
      <option value="sedang">Moderate Activity</option>
      <option value="tinggi">High Activity</option>
    </select>

    <select id="target">
      <option value="turun">Turun Berat</option>
      <option value="naik">Naik Berat</option>
    </select>

    <button onclick="proses()">Generate</button>
  </div>

  <div id="loading" class="card hidden">
    <div class="spinner"></div>
    <p>Menyiapkan menu kamu...</p>
  </div>

  <div id="hasil" class="card"></div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
